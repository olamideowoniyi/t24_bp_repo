name: T24 BP - Compile and Deploy

on:
  push:
    branches:
      - dev
      - uat
      - prod
    paths:
      - 'bp/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, uat, prod]

jobs:
  compile-and-deploy:
    runs-on: [self-hosted, "${{ github.event.inputs.environment || github.ref_name }}"]

    env:
      ENV: ${{ github.event.inputs.environment || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile and Deploy (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          pipeline\compile.bat
          pipeline\deploy.bat

      - name: Compile and Deploy (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x pipeline/compile.sh pipeline/deploy.sh
          pipeline/compile.sh
          pipeline/deploy.sh
